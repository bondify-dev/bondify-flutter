name: bondify_flutter
description: >-
  Bondify Flutter SDK — one-tap Telegram authentication for Flutter apps.
  Drop-in login button, QR bottom sheet, polling client and proof verification.
  No SMS, no passwords — just a Telegram tap.
version: 1.0.0
homepage: https://bondify.dev
repository: https://github.com/bondify/bondify-flutter
documentation: https://docs.bondify.dev
issue_tracker: https://github.com/bondify/bondify-flutter/issues

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  # No bundled assets — the Telegram glyph is drawn with CustomPainter.
