name: bondify_flutter
description: >
  Bondify Flutter SDK — Telegram Authentication for Flutter mobile apps.
  Drop-in widgets, polling client, and proof verification.
version: 1.0.1
homepage: https://bondify.dev
repository: https://github.com/bondify/bondify-flutter

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  http:          ^1.2.0
  url_launcher:  ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:  ^4.0.0
  mockito:        ^5.4.4
  build_runner:   ^2.4.8

